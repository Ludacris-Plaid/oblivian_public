services:
  - type: web
    name: oblivian-api
    env: docker
    plan: free
    envVars:
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.0