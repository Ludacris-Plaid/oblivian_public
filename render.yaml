services:
  # Backend Python API + WebSocket server
  - type: web
    name: oblivian-api
    env: docker
    plan: free
    envVars:
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: REDIS_URL
        # Get a free Redis URL from Upstash (console.upstash.com → Create Redis → copy UPSTASH_REDIS_REST_URL)
        # Format: redis://default:yourpassword@your-host.upstash.io:6379
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.0

  # Frontend static site (built from dist/)
  - type: static
    name: oblivian-frontend
    buildCommand: npm install && npx vite build
    publishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://oblivian-api.onrender.com/api/*
      - type: rewrite
        source: /ws/*
        destination: https://oblivian-api.onrender.com/ws/*
      - type: rewrite
        source: /*
        destination: /index.html
